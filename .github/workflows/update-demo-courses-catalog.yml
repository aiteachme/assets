name: Update Demo Courses Catalog

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build catalog
        run: python scripts/update_demo_courses_catalog.py

      - name: Commit catalog changes
        run: |
          if git diff --quiet -- demo-courses/catalog/v1/index.json; then
            echo "Demo course catalog is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add demo-courses/catalog/v1/index.json
          git commit -m "chore: update demo courses catalog"
          git push
